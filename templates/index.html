<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>donlotaja</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-2: #1a1a28;
            --border: #252538;
            --text: #e4e4ed;
            --text-secondary: #8888a0;
            --accent: #7c6aff;
            --accent-dim: #5a4fbf;
            --accent-glow: rgba(124, 106, 255, 0.15);
            --success: #34d399;
            --error: #f87171;
            --radius: 16px;
            --radius-sm: 10px;
        }

        html { font-size: 16px; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Layout ── */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px 20px;
            width: 100%;
            flex: 1;
        }

        /* ── Header ── */
        header {
            text-align: center;
            padding: 48px 0 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo svg {
            width: 36px;
            height: 36px;
            -webkit-text-fill-color: initial;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 8px;
            font-weight: 400;
        }

        /* ── Search Box ── */
        .search-section {
            margin-bottom: 32px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 4px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            padding: 14px 16px;
        }

        .input-group input::placeholder {
            color: var(--text-secondary);
        }

        .input-group button {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            padding: 12px 24px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group button:hover {
            background: var(--accent-dim);
        }

        .input-group button:active {
            transform: scale(0.97);
        }

        .input-group button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .input-group button.loading .spinner {
            display: inline-block;
        }
        .input-group button.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Error ── */
        .error-box {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            margin-bottom: 24px;
            display: none;
            color: var(--error);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .error-box.show {
            display: block;
        }

        /* ── Loading State ── */
        .loading-state {
            display: none;
            text-align: center;
            padding: 60px 0;
        }

        .loading-state.show {
            display: block;
        }

        .loading-pulse {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            margin: 0 auto 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        .loading-state p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* ── Result Card ── */
        .result {
            display: none;
        }

        .result.show {
            display: block;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .card-header {
            display: flex;
            gap: 16px;
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .card-thumb {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            flex-shrink: 0;
            background: var(--surface-2);
        }

        .card-info {
            flex: 1;
            min-width: 0;
        }

        .card-info h2 {
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .card-meta span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .platform-badge {
            display: inline-block;
            background: var(--accent-glow);
            color: var(--accent);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        /* ── Format List ── */
        .format-list {
            padding: 16px 20px;
        }

        .format-list h3 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .format-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            transition: background 0.2s;
        }

        .format-item:hover {
            background: rgba(124, 106, 255, 0.08);
        }

        .format-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .format-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .format-icon.video {
            background: rgba(124, 106, 255, 0.15);
            color: var(--accent);
        }

        .format-icon.audio {
            background: rgba(52, 211, 153, 0.15);
            color: var(--success);
        }

        .format-detail {
            font-size: 0.9rem;
        }

        .format-detail .label {
            font-weight: 600;
        }

        .format-detail .hint {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .format-size {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-left: 8px;
        }

        .format-item .download-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .format-item .download-btn:hover {
            background: var(--accent-dim);
        }

        .format-item .download-btn.copy-link {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .format-item .download-btn.copy-link:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 32px 20px 24px;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* ── Quick Examples ── */
        .examples {
            margin-top: 24px;
        }

        .examples p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .example-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .chip {
            padding: 6px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .container {
                padding: 16px 14px;
            }
            header {
                padding: 32px 0 28px;
            }
            .logo {
                font-size: 1.6rem;
            }
            .input-group {
                flex-direction: column;
                background: transparent;
                border: none;
                padding: 0;
                gap: 8px;
            }
            .input-group input {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
            }
            .input-group button {
                justify-content: center;
            }
            .card-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .card-thumb {
                width: 60px;
                height: 60px;
            }
            .format-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .format-item .download-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg viewBox="0 0 36 36" fill="none">
                    <rect width="36" height="36" rx="10" fill="url(#glogo)"/>
                    <path d="M11 18l5 5 9-9" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="glogo" x1="0" y1="0" x2="36" y2="36">
                            <stop stop-color="#7c6aff"/>
                            <stop offset="1" stop-color="#a78bfa"/>
                        </linearGradient>
                    </defs>
                </svg>
                donlotaja
            </div>
            <p class="subtitle">Paste link, dapatkan tautan download langsung</p>
        </header>

        <div class="search-section">
            <div class="input-group">
                <input
                    type="url"
                    id="urlInput"
                    placeholder="Tempel link YouTube, TikTok, IG, X, Threads..."
                    spellcheck="false"
                    autofocus
                >
                <button id="extractBtn" onclick="extract()">
                    <span class="btn-text">↗ Cari</span>
                    <span class="spinner"></span>
                </button>
            </div>
        </div>

        <div class="error-box" id="errorBox"></div>

        <div class="loading-state" id="loadingState">
            <div class="loading-pulse"></div>
            <p>Sedang mencari tautan download...</p>
        </div>

        <div class="result" id="resultContainer">
            <div class="card" id="resultCard">
                <div class="card-header">
                    <img class="card-thumb" id="thumbEl" src="" alt="thumbnail">
                    <div class="card-info">
                        <h2 id="titleEl"></h2>
                        <div class="card-meta">
                            <span class="platform-badge" id="platformEl"></span>
                            <span id="uploaderEl"></span>
                            <span id="durationEl"></span>
                        </div>
                    </div>
                </div>
                <div class="format-list" id="formatList">
                    <h3>Tautan Download</h3>
                    <div id="formatItems"></div>
                </div>
            </div>
        </div>

        <div class="examples">
            <p>Contoh link yang didukung:</p>
            <div class="example-chips" id="exampleChips">
                <span class="chip" data-url="https://youtube.com/watch?v=dQw4w9WgXcQ">YouTube</span>
                <span class="chip" data-url="https://tiktok.com/@instagram/video/7447225305723129094">TikTok</span>
                <span class="chip" data-url="https://x.com/NASA/status/1867892581544677744">X/Twitter</span>
                <span class="chip" data-url="https://instagram.com/reel/DG2xVw3SCoM-">Instagram</span>
                <span class="chip" data-url="https://threads.net/@user/post/DHYZnxczrsC">Threads</span>
                <span class="chip" data-url="https://soundcloud.com/artist/track">SoundCloud</span>
            </div>
        </div>

        <footer>
            <a href="https://github.com/smpabbs/donlotaja" target="_blank">donlotaja</a> &mdash; open-source multi-platform downloader
        </footer>
    </div>

    <script>
        // ── Helpers ──
        function formatDuration(seconds) {
            if (!seconds) return "";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            return `${m}:${String(s).padStart(2,'0')}`;
        }

        function formatFileSize(mb) {
            if (!mb || mb <= 0) return "";
            if (mb < 1) return `${Math.round(mb * 1000)} KB`;
            return `${mb.toFixed(1)} MB`;
        }

        function showError(msg) {
            const el = document.getElementById('errorBox');
            el.textContent = msg;
            el.classList.add('show');
            document.getElementById('loadingState').classList.remove('show');
            document.getElementById('resultContainer').classList.remove('show');
        }

        function hideError() {
            document.getElementById('errorBox').classList.remove('show');
        }

        function platformIcon(platform) {
            const icons = {
                youtube: '▶',
                tiktok: '♪',
                instagram: '📷',
                twitter: '𝕏',
                threads: '🧵',
                facebook: 'f',
                soundcloud: '☁',
                spotify: '🔊',
                twitch: '📺',
                vimeo: 'V'
            };
            return icons[platform] || '🌐';
        }

        // ── Main Extract ──
        async function extract() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                showError('Masukkan link terlebih dahulu.');
                return;
            }

            hideError();
            document.getElementById('loadingState').classList.add('show');
            document.getElementById('resultContainer').classList.remove('show');

            const btn = document.getElementById('extractBtn');
            btn.disabled = true;
            btn.classList.add('loading');

            try {
                const res = await fetch('/api/extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await res.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                renderResult(data);
            } catch (e) {
                showError('Gagal terhubung ke server. Coba lagi.');
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
                document.getElementById('loadingState').classList.remove('show');
            }
        }

        function renderResult(data) {
            document.getElementById('resultContainer').classList.add('show');

            document.getElementById('titleEl').textContent = data.title;
            document.getElementById('platformEl').textContent = `${platformIcon(data.platform)} ${data.platform}`;
            document.getElementById('uploaderEl').textContent = data.uploader || '';
            document.getElementById('durationEl').textContent = data.duration ? formatDuration(data.duration) : '';

            const thumb = document.getElementById('thumbEl');
            if (data.thumbnail) {
                thumb.src = data.thumbnail;
                thumb.style.display = 'block';
            } else {
                thumb.style.display = 'none';
            }

            const container = document.getElementById('formatItems');
            container.innerHTML = '';

            if (!data.formats || data.formats.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); padding: 12px 0;">Tidak ada format tersedia.</p>';
                return;
            }

            // Deduplicate by resolution
            const seen = new Set();
            const formats = [];

            for (const f of data.formats) {
                const key = `${f.resolution}-${f.ext}-${f.filesize}`;
                if (seen.has(key)) continue;
                seen.add(key);
                formats.push(f);
            }

            // Best format first
            const bestIdx = data.best ? formats.findIndex(f => f.url === data.best.url) : -1;
            if (bestIdx > 0) {
                const best = formats.splice(bestIdx, 1)[0];
                formats.unshift(best);
            }

            for (const f of formats) {
                const item = document.createElement('div');
                item.className = 'format-item';

                const isVideo = f.has_video;
                const label = isVideo ? f.resolution : 'Audio';
                const hint = isVideo
                    ? `${f.ext.toUpperCase()} · ${f.format_note || f.resolution}${f.fps > 30 ? ` · ${f.fps}fps` : ''}`
                    : `${f.ext.toUpperCase()} · Audio only`;

                item.innerHTML = `
                    <div class="format-left">
                        <div class="format-icon ${isVideo ? 'video' : 'audio'}">
                            ${isVideo ? '🎬' : '🎵'}
                        </div>
                        <div>
                            <div class="format-detail">
                                <span class="label">${label}</span>
                                <span class="hint">${hint}</span>
                            </div>
                            ${f.filesize_mb ? `<div class="format-size">${formatFileSize(f.filesize_mb)}</div>` : ''}
                        </div>
                    </div>
                    <div style="display:flex;gap:6px;flex-wrap:wrap;">
                        <a href="${f.url}" class="download-btn" target="_blank" rel="noopener">⬇ Download</a>
                        <button class="download-btn copy-link" onclick="copyLink('${f.url.replace(/'/g, "\\'")}')">📋</button>
                    </div>
                `;

                container.appendChild(item);
            }
        }

        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                const toast = document.createElement('div');
                toast.textContent = '✅ Link disalin!';
                Object.assign(toast.style, {
                    position: 'fixed', bottom: '20px', left: '50%', transform: 'translateX(-50%)',
                    background: '#34d399', color: '#000', padding: '10px 24px', borderRadius: '10px',
                    fontWeight: '600', fontSize: '0.9rem', zIndex: '999',
                    boxShadow: '0 4px 20px rgba(0,0,0,0.3)'
                });
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            });
        }

        // ── Enter key ──
        document.getElementById('urlInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') extract();
        });

        // ── Example chips ──
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.getElementById('urlInput').value = chip.dataset.url;
                extract();
            });
        });

        // Auto-focus on desktop
        if (window.innerWidth > 600) {
            document.getElementById('urlInput').focus();
        }
    </script>
</body>
</html>
