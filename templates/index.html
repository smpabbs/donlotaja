<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
<title>donlotaja — Downloader Multi-Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Base ───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:Inter,system-ui,-apple-system,sans-serif;
  background:#07070d;
  color:#e4e4ed;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
  position:relative;
  overflow-x:hidden;
}

/* ─── Animated Background ────────────────────────────────────── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 50% -20%, rgba(124,106,255,.12) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(52,211,153,.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 20% 90%, rgba(168,85,247,.08) 0%, transparent 60%);
}

/* ─── Particles Grid ─────────────────────────────────────────── */
.bg-grid{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
  background-size:60px 60px;
}

/* ─── Layout ─────────────────────────────────────────────────── */
.container{
  position:relative;
  z-index:1;
  max-width:840px;
  margin:0 auto;
  padding:20px 24px;
  width:100%;
  flex:1;
}

/* ─── Header ─────────────────────────────────────────────────── */
header{
  text-align:center;
  padding:60px 0 20px;
  animation:fadeDown .6s ease-out;
}
@keyframes fadeDown{
  from{opacity:0;transform:translateY(-20px)}
  to{opacity:1;transform:translateY(0)}
}

.logo{
  display:inline-flex;
  align-items:center;
  gap:14px;
  font-size:2.4rem;
  font-weight:800;
  letter-spacing:-.5px;
  text-decoration:none;
  transition:transform .3s ease;
}
.logo:hover{transform:scale(1.03)}
.logo-icon{
  width:44px;height:44px;
  border-radius:14px;
  background:linear-gradient(135deg,#7c6aff,#a78bfa);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(124,106,255,.35);
  transition:box-shadow .3s,transform .3s;
}
.logo:hover .logo-icon{
  box-shadow:0 6px 30px rgba(124,106,255,.5);
  transform:rotate(-5deg) scale(1.02);
}
.logo-icon svg{width:24px;height:24px;display:block}
.logo-text{
  background:linear-gradient(135deg,#e4e4ed 30%,#7c6aff 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  font-family:'Space Grotesk',sans-serif;
}

.subtitle{
  color:#8888a0;
  font-size:1.05rem;
  margin-top:10px;
  font-weight:400;
  letter-spacing:.2px;
}
.subtitle span{
  display:inline-block;
  background:linear-gradient(135deg,#7c6aff,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  font-weight:600;
}

/* ─── Supported Platforms Strip ──────────────────────────────── */
.platform-strip{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  margin:18px auto 0;
  max-width:520px;
  animation:fadeDown .6s ease-out .1s backwards;
}
.plat-badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  border-radius:100px;
  padding:4px 14px 4px 10px;
  font-size:.75rem;
  font-weight:500;
  color:#8888a0;
  transition:all .25s ease;
}
.plat-badge:hover{
  background:rgba(124,106,255,.1);
  border-color:rgba(124,106,255,.2);
  color:#e4e4ed;
  transform:translateY(-1px);
}
.plat-badge .dot{
  width:7px;height:7px;
  border-radius:50%;
  flex-shrink:0;
}

/* ─── Search / Input ─────────────────────────────────────────── */
.search-section{
  margin:32px auto;
  max-width:680px;
  animation:fadeDown .6s ease-out .15s backwards;
}
.input-group{
  display:flex;
  gap:0;
  background:rgba(18,18,28,.8);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:5px;
  transition:border-color .3s,box-shadow .4s,transform .3s;
  box-shadow:0 4px 30px rgba(0,0,0,.2);
}
.input-group:focus-within{
  border-color:rgba(124,106,255,.4);
  box-shadow:0 0 0 4px rgba(124,106,255,.08),0 8px 40px rgba(0,0,0,.3);
  transform:translateY(-1px);
}
.input-group input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:#e4e4ed;
  font-family:inherit;
  font-size:1rem;
  padding:16px 20px;
  min-width:0;
}
.input-group input::placeholder{color:#666680}
.input-group button{
  background:linear-gradient(135deg,#7c6aff,#6a5ae0);
  color:#fff;
  border:none;
  border-radius:12px;
  padding:14px 28px;
  font-family:inherit;
  font-size:.95rem;
  font-weight:600;
  cursor:pointer;
  transition:all .25s ease;
  white-space:nowrap;
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
  box-shadow:0 2px 12px rgba(124,106,255,.25);
}
.input-group button:hover{
  background:linear-gradient(135deg,#8c7aff,#7c6aff);
  box-shadow:0 4px 20px rgba(124,106,255,.4);
  transform:scale(1.02);
}
.input-group button:active{transform:scale(.97)}
.input-group button:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-icon{font-size:1.1rem;line-height:1}
.spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.btn-loading .spinner{display:inline-block}
.btn-loading .btn-icon{display:none}
.btn-loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Quick Examples ─────────────────────────────────────────── */
.examples{
  margin-top:16px;
  text-align:center;
  animation:fadeDown .6s ease-out .2s backwards;
}
.examples p{
  font-size:.8rem;
  color:#666680;
  margin-bottom:8px;
}
.chips{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
}
.chip{
  padding:6px 16px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  border-radius:100px;
  font-size:.8rem;
  color:#8888a0;
  cursor:pointer;
  transition:all .25s ease;
  user-select:none;
}
.chip:hover{
  border-color:rgba(124,106,255,.3);
  color:#fff;
  background:rgba(124,106,255,.1);
  transform:translateY(-2px);
}
.chip:active{transform:scale(.95)}

/* ─── Error ──────────────────────────────────────────────────── */
.error-box{
  max-width:680px;
  margin:0 auto 20px;
  background:rgba(248,113,113,.08);
  border:1px solid rgba(248,113,113,.2);
  border-radius:12px;
  padding:14px 20px;
  display:none;
  color:#fca5a5;
  font-size:.9rem;
  word-break:break-word;
  animation:shake .4s ease-out;
}
.error-box.show{display:block}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}

/* ─── Loading State ──────────────────────────────────────────── */
.loading-state{
  display:none;
  text-align:center;
  padding:60px 20px;
  max-width:680px;
  margin:0 auto;
}
.loading-state.show{display:block;animation:fadeUp .4s ease-out}

/* Skeleton loader */
.skeleton-group{max-width:680px;margin:0 auto}
.skel-card{
  background:rgba(18,18,28,.6);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;
  padding:24px;
  margin-bottom:16px;
  backdrop-filter:blur(10px);
}
.skel-row{
  display:flex;gap:16px;align-items:flex-start;
}
.skel-thumb{
  width:96px;height:72px;border-radius:10px;
  background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);
  background-size:200% 100%;
  animation:shimmer 1.8s infinite;
  flex-shrink:0;
}
.skel-lines{flex:1;display:flex;flex-direction:column;gap:10px}
.skel-line{
  height:14px;border-radius:6px;
  background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);
  background-size:200% 100%;
  animation:shimmer 1.8s infinite;
}
.skel-line:nth-child(1){width:75%;height:18px}
.skel-line:nth-child(2){width:45%}
.skel-line:nth-child(3){width:55%}
.skel-formats{margin-top:18px;display:flex;flex-direction:column;gap:10px}
.skel-format{
  height:52px;border-radius:10px;
  background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.03) 75%);
  background-size:200% 100%;
  animation:shimmer 1.8s infinite .1s;
}
.skel-format:nth-child(2){animation-delay:.2s}
.skel-format:nth-child(3){animation-delay:.3s}

@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* ─── Results ────────────────────────────────────────────────── */
.result{display:none}
.result.show{display:block;animation:fadeUp .45s ease-out}

.result-card{
  background:rgba(18,18,28,.75);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.07);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.25);
  max-width:680px;
  margin:0 auto;
  transition:box-shadow .3s;
}
.result-card:hover{box-shadow:0 12px 60px rgba(0,0,0,.35)}

/* Header area with thumbnail */
.card-media{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  max-height:340px;
  overflow:hidden;
  background:#12121a;
}
.card-media img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform .6s ease;
}
.result-card:hover .card-media img{transform:scale(1.03)}
.card-overlay{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:60px 24px 20px;
  background:linear-gradient(transparent,rgba(0,0,0,.85));
}
.card-badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:4px 14px;
  border-radius:100px;
  font-size:.72rem;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.5px;
  margin-bottom:8px;
}
.card-title{
  font-size:1.1rem;
  font-weight:700;
  line-height:1.4;
  color:#fff;
  text-shadow:0 2px 8px rgba(0,0,0,.4);
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.card-meta{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:6px;
  font-size:.82rem;
  color:rgba(255,255,255,.7);
}

/* Format List */
.format-section{padding:20px 24px 24px}
.format-section h3{
  font-size:.8rem;
  font-weight:600;
  color:#8888a0;
  text-transform:uppercase;
  letter-spacing:.8px;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:6px;
}
.format-section h3::after{
  content:'';
  flex:1;
  height:1px;
  background:rgba(255,255,255,.06);
}

.format-item{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 18px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  border-radius:12px;
  margin-bottom:8px;
  transition:all .25s ease;
}
.format-item:hover{
  background:rgba(124,106,255,.06);
  border-color:rgba(124,106,255,.15);
  transform:translateX(3px);
}
.format-icon{
  width:40px;height:40px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.1rem;
  flex-shrink:0;
}
.format-icon.video{
  background:rgba(124,106,255,.12);
  color:#a78bfa;
}
.format-icon.audio{
  background:rgba(52,211,153,.12);
  color:#34d399;
}
.format-detail{flex:1;min-width:0}
.format-label{
  font-weight:600;
  font-size:.9rem;
}
.format-hint{
  font-size:.78rem;
  color:#8888a0;
  margin-top:2px;
}
.format-size{
  display:inline-block;
  padding:2px 8px;
  border-radius:6px;
  font-size:.72rem;
  font-weight:500;
  margin-left:6px;
  background:rgba(255,255,255,.05);
  color:#8888a0;
}
.format-size.known{background:rgba(52,211,153,.1);color:#34d399}
.format-actions{
  display:flex;
  gap:6px;
  flex-shrink:0;
}
.btn-dl{
  display:inline-flex;
  align-items:center;
  gap:5px;
  background:linear-gradient(135deg,#7c6aff,#6a5ae0);
  color:#fff;
  border:none;
  border-radius:8px;
  padding:9px 16px;
  font-family:inherit;
  font-size:.8rem;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  transition:all .2s ease;
  white-space:nowrap;
}
.btn-dl:hover{
  background:linear-gradient(135deg,#8c7aff,#7c6aff);
  box-shadow:0 3px 12px rgba(124,106,255,.3);
  transform:scale(1.03);
}
.btn-dl:active{transform:scale(.95)}
.btn-copy{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  color:#8888a0;
  border-radius:8px;
  width:36px;height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.9rem;
  cursor:pointer;
  transition:all .2s ease;
}
.btn-copy:hover{
  border-color:rgba(124,106,255,.3);
  color:#7c6aff;
  background:rgba(124,106,255,.08);
}

/* Platform colors */
.plat-youtube .card-badge{background:rgba(255,0,0,.15);color:#ff4444}
.plat-tiktok .card-badge{background:rgba(0,204,255,.15);color:#00ccff}
.plat-instagram .card-badge{background:rgba(225,48,108,.15);color:#e1306c}
.plat-twitter .card-badge{background:rgba(29,161,242,.15);color:#1da1f2}
.plat-facebook .card-badge{background:rgba(24,119,242,.15);color:#1877f2}
.plat-soundcloud .card-badge{background:rgba(255,85,0,.15);color:#ff5500}
.plat-spotify .card-badge{background:rgba(30,215,96,.15);color:#1ed760}
.plat-unknown .card-badge{background:rgba(124,106,255,.12);color:#a78bfa}

.chip[data-url]{position:relative}
.chip[data-url]::after{display:none}

/* ─── Footer ─────────────────────────────────────────────────── */
footer{
  position:relative;
  z-index:1;
  text-align:center;
  padding:32px 24px 28px;
  color:#555570;
  font-size:.8rem;
}
footer a{
  color:#7c6aff;
  text-decoration:none;
  font-weight:500;
  transition:color .2s;
}
footer a:hover{color:#a78bfa;text-decoration:underline}
footer .footer-heart{color:#f87171;display:inline-block;animation:pulseHeart 1.5s infinite}
@keyframes pulseHeart{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.2)}
}
footer .footer-divider{color:#333345;margin:0 8px}

/* ─── Toast ──────────────────────────────────────────────────── */
.toast{
  position:fixed;
  bottom:28px;
  left:50%;
  transform:translateX(-50%) translateY(80px);
  background:rgba(18,18,28,.92);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.08);
  color:#34d399;
  padding:12px 28px;
  border-radius:12px;
  font-weight:600;
  font-size:.9rem;
  z-index:999;
  box-shadow:0 8px 40px rgba(0,0,0,.4);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .25s;
  opacity:0;
  pointer-events:none;
  white-space:nowrap;
}
.toast.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
  pointer-events:auto;
}

/* ─── Responsive ─────────────────────────────────────────────── */
@media(max-width:700px){
  .container{padding:14px 16px}
  header{padding:36px 0 10px}
  .logo{font-size:1.7rem;gap:10px}
  .logo-icon{width:36px;height:36px;border-radius:11px}
  .logo-icon svg{width:20px;height:20px}
  .subtitle{font-size:.9rem}
  .platform-strip{gap:5px;margin-top:14px}
  .plat-badge{font-size:.68rem;padding:3px 10px 3px 7px}
  .search-section{margin:22px auto}
  .input-group{flex-direction:column;background:transparent;border:none;padding:0;gap:10px;box-shadow:none}
  .input-group:focus-within{box-shadow:none;transform:none}
  .input-group input{
    background:rgba(18,18,28,.8);
    border:1px solid rgba(255,255,255,.08);
    border-radius:14px;
    padding:14px 16px;
    backdrop-filter:blur(20px);
  }
  .input-group button{
    justify-content:center;
    padding:13px 20px;
    border-radius:12px;
  }
  .card-media{aspect-ratio:16/9;max-height:200px}
  .card-overlay{padding:40px 16px 14px}
  .card-title{font-size:.95rem}
  .format-section{padding:14px 16px 18px}
  .format-item{padding:12px 14px;gap:10px}
  .format-icon{width:34px;height:34px;font-size:.95rem;border-radius:8px}
  .btn-dl{padding:8px 12px;font-size:.75rem}
  .btn-copy{width:32px;height:32px;font-size:.8rem}
  .skel-thumb{width:72px;height:54px}
  .toast{font-size:.82rem;padding:10px 20px;bottom:18px}
}

@media(max-width:420px){
  .container{padding:10px 12px}
  .logo{font-size:1.4rem}
  .logo-icon{width:30px;height:30px;border-radius:9px}
  .logo-icon svg{width:16px;height:16px}
  header{padding:24px 0 6px}
  .card-media{aspect-ratio:16/9;max-height:170px}
  .format-actions{gap:4px}
  .btn-dl{padding:7px 10px;font-size:.7rem}
  .format-label{font-size:.8rem}
}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M4 12l6-6 2 2-6 6-2-2z" fill="currentColor"/>
          <path d="M10 12l6-6 2 2-6 6-2-2z" fill="currentColor" opacity=".5"/>
          <rect x="4" y="12" width="16" height="2" rx="1" fill="currentColor"/>
        </svg>
      </div>
      <span class="logo-text">donlotaja</span>
    </div>
    <p class="subtitle">Paste link, download langsung ke <span>perangkat</span></p>

    <div class="platform-strip">
      <span class="plat-badge"><span class="dot" style="background:#ff4444"></span>YouTube</span>
      <span class="plat-badge"><span class="dot" style="background:#00ccff"></span>TikTok</span>
      <span class="plat-badge"><span class="dot" style="background:#e1306c"></span>Instagram</span>
      <span class="plat-badge"><span class="dot" style="background:#1da1f2"></span>X / Twitter</span>
      <span class="plat-badge"><span class="dot" style="background:#1877f2"></span>Facebook</span>
      <span class="plat-badge"><span class="dot" style="background:#ff5500"></span>SoundCloud</span>
    </div>
  </header>

  <div class="search-section">
    <div class="input-group">
      <input type="url" id="urlInput" placeholder="Tempel link YouTube, IG, TikTok, X..." spellcheck="false" autofocus>
      <button id="extractBtn" onclick="extract()">
        <span class="btn-icon">↗</span>
        <span class="btn-text">Cari & Download</span>
        <span class="spinner"></span>
      </button>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="loading-state" id="loadingState">
    <div class="skeleton-group">
      <div class="skel-card">
        <div class="skel-row">
          <div class="skel-thumb"></div>
          <div class="skel-lines">
            <div class="skel-line"></div>
            <div class="skel-line"></div>
            <div class="skel-line"></div>
          </div>
        </div>
        <div class="skel-formats">
          <div class="skel-format"></div>
          <div class="skel-format"></div>
          <div class="skel-format"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="result" id="resultContainer">
    <div class="result-card" id="resultCard">
      <div class="card-media">
        <img id="thumbEl" src="" alt="thumbnail">
        <div class="card-overlay">
          <div class="card-badge" id="platformEl"></div>
          <h2 class="card-title" id="titleEl"></h2>
          <div class="card-meta">
            <span id="uploaderEl"></span>
            <span id="durationEl"></span>
          </div>
        </div>
      </div>
      <div class="format-section" id="formatList">
        <h3>Pilih Format</h3>
        <div id="formatItems"></div>
      </div>
    </div>
  </div>

  <div class="examples">
    <p>Coba salah satu:</p>
    <div class="chips">
      <span class="chip" data-url="https://youtube.com/watch?v=dQw4w9WgXcQ">▶ YouTube</span>
      <span class="chip" data-url="https://www.instagram.com/reel/DXZttc1k_Bs/">📷 Instagram</span>
      <span class="chip" data-url="https://tiktok.com/@instagram/video/7447225305723129094">🎵 TikTok</span>
      <span class="chip" data-url="https://x.com/NASA/status/1867892581544677744">𝕏 X/Twitter</span>
    </div>
  </div>
</div>

<footer>
  <a href="https://github.com/smpabbs/donlotaja" target="_blank">donlotaja</a>
  <span class="footer-divider">·</span>
  open-source <span class="footer-heart">❤</span>
  <span class="footer-divider">·</span>
  multi-platform downloader
</footer>

<div class="toast" id="toast"></div>

<script>
/* ─── Helpers ───────────────────────────────────────────────── */
function fmtDur(s){
  if(!s) return '';
  const h=Math.floor(s/3600), m=Math.floor(s%3600/60), s2=s%60;
  return h ? h+':'+String(m).padStart(2,'0')+':'+String(s2).padStart(2,'0')
           : m+':'+String(s2).padStart(2,'0');
}
function fmtSz(mb){
  if(!mb||mb<=0) return '';
  return mb<1 ? '~'+Math.round(mb*1000)+'KB' : '~'+mb.toFixed(1)+'MB';
}
function err(m){
  const e=document.getElementById('errorBox');
  e.textContent=m;
  e.classList.add('show');
  document.getElementById('loadingState').classList.remove('show');
  document.getElementById('resultContainer').classList.remove('show');
}
function hideErr(){ document.getElementById('errorBox').classList.remove('show'); }
function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

const PLATFORM_CLASSES = {
  youtube:'plat-youtube', tiktok:'plat-tiktok', instagram:'plat-instagram',
  twitter:'plat-twitter', facebook:'plat-facebook', soundcloud:'plat-soundcloud',
  spotify:'plat-spotify'
};

/* ─── Extract ────────────────────────────────────────────────── */
async function extract(){
  const url=document.getElementById('urlInput').value.trim();
  if(!url){ err('Masukkan link terlebih dahulu.'); return; }
  hideErr();
  document.getElementById('loadingState').classList.add('show');
  document.getElementById('resultContainer').classList.remove('show');
  const btn=document.getElementById('extractBtn');
  btn.disabled=true; btn.classList.add('btn-loading');
  try{
    const r=await fetch('/api/extract',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url})
    });
    const d=await r.json();
    if(d.error){ err(d.error); return; }
    render(d);
  }catch(e){ err('Gagal terhubung ke server. Coba lagi.') }
  finally{
    btn.disabled=false;
    btn.classList.remove('btn-loading');
    document.getElementById('loadingState').classList.remove('show');
  }
}

/* ─── Render Results ─────────────────────────────────────────── */
function render(d){
  const rc=document.getElementById('resultCard');
  rc.className='result-card '+(PLATFORM_CLASSES[d.platform]||'plat-unknown');

  document.getElementById('resultContainer').classList.add('show');
  document.getElementById('titleEl').textContent=d.title;
  document.getElementById('platformEl').textContent=d.platform;
  document.getElementById('uploaderEl').textContent=d.uploader||'';
  document.getElementById('durationEl').textContent=d.duration ? fmtDur(d.duration) : '';

  const thumb=document.getElementById('thumbEl');
  if(d.thumbnail){
    thumb.src=d.thumbnail;
    thumb.style.display='block';
    thumb.alt=d.title||'thumbnail';
  }else{
    thumb.style.display='none';
  }

  const c=document.getElementById('formatItems');
  c.innerHTML='';

  if(!d.formats||!d.formats.length){
    c.innerHTML='<p style="color:#8888a0;text-align:center;padding:20px 0">Tidak ada format tersedia untuk konten ini.</p>';
    return;
  }

  // Deduplicate
  const seen=new Set(), fmts=[];
  for(const f of d.formats){
    const k=f.resolution+'-'+f.ext;
    if(!seen.has(k)){ seen.add(k); fmts.push(f); }
  }

  // Best format first
  const best=d.best;
  if(best){ const i=fmts.indexOf(best); if(i>0){ fmts.splice(i,1); fmts.unshift(best); } }

  const title=d.title||'video';
  for(const f of fmts){
    const el=document.createElement('div');
    el.className='format-item';
    const v=!!f.has_video;
    const lbl=v ? (f.resolution||'Video') : 'Audio';
    const hint=v ? f.ext.toUpperCase()+(f.fps>30?' · '+f.fps+'fps':'')
                 : f.ext.toUpperCase()+' · Audio';
    const sz=f.filesize_mb>0
      ? '<span class="format-size known">'+fmtSz(f.filesize_mb)+'</span>'
      : '<span class="format-size">~? MB</span>';
    const fn=(title.replace(/[^a-zA-Z0-9]/g,'_')+'.'+f.ext).replace(/[^a-zA-Z0-9._-]/g,'');
    const dlSrc='/api/dl?source='+encodeURIComponent(d.webpage_url||'')+'&filename='+encodeURIComponent(fn);

    el.innerHTML=
      '<div class="format-icon '+(v?'video':'audio')+'">'+(v?'🎬':'🎵')+'</div>'+
      '<div class="format-detail">'+
        '<div class="format-label">'+lbl+'</div>'+
        '<div class="format-hint">'+hint+sz+'</div>'+
      '</div>'+
      '<div class="format-actions">'+
        '<a href="'+dlSrc+'" class="btn-dl" target="_blank">⬇ Download</a>'+
        '<button class="btn-copy" title="Salin link" onclick="navigator.clipboard.writeText(\''+f.url.replace(/'/g,"\\'")+'\').then(()=>toast(\'✅ Link disalin!\'))">📋</button>'+
      '</div>';
    c.appendChild(el);
  }
}

/* ─── Events ─────────────────────────────────────────────────── */
document.getElementById('urlInput').addEventListener('keydown',e=>{
  if(e.key==='Enter') extract();
});
document.querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click',()=>{
    document.getElementById('urlInput').value=c.dataset.url;
    extract();
  });
});

// Auto-focus desktop only
if(window.innerWidth>700) document.getElementById('urlInput').focus();
</script>
</body>
</html>
